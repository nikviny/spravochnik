<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
    crossorigin="anonymous">
    <link rel="stylesheet" href="{{url_for('static', filename='css/main.css')}}">
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
    <div class="conteiner">
        <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
        <img class="header__img" src={{ url_for('static', filename='img/logo.png') }} alt="logo">
        <span class="fs-3" href="{{ url_for('glav') }}" style="color: white;"><pre> Справочник "Зимние олимпийские игры"</pre></span>
        </a>
        <ul class="nav nav-pills"> 
        <li class="nav-item"><a href="{{ url_for('index') }}" class="nav-link active" aria-current="page">О играх</a></li>
        <li class="nav-item"><a href="{{ url_for('about') }}" class="nav-link" style="color: white;">Виды спорта</a></li>
        <li class="nav-item"><a href="{{ url_for('posl_igr') }}" class="nav-link" style="color: white;">Последние игры</a></li>
        <li class="nav-item"><a href="{{ url_for('bud_igr') }}" class="nav-link" style="color: white;">Следущие игры</a></li>
        <li class="nav-item"><a href="{{ url_for('dost') }}" class="nav-link" style="color: white;">Достижения России на ОИ</a></li>
        </ul>
        </header>
        {% block body %}{% endblock %}
    </div>
</body>
</html>
